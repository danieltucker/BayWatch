services:
  backend:
    image: danielgt/drivemap-backend:0.5.3
    restart: unless-stopped
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - drivemap_data:/app/data
    privileged: true
    environment:
      DATABASE_URL: sqlite:////app/data/drivemap.db
      SCAN_INTERVAL_MINUTES: "60"
      TEMP_ALERT_THRESHOLD_C: "55"
      WARRANTY_WARNING_DAYS: "90"
      LOG_LEVEL: INFO
      # Optional — fill in to enable Telegram alerts:
      # TELEGRAM_BOT_TOKEN: ""
      # TELEGRAM_CHAT_ID: ""
  frontend:
    image: danielgt/drivemap-frontend:0.5.1
    restart: unless-stopped
    ports:
      - "8585:80"
    depends_on:
      - backend

volumes:
  drivemap_data:
